<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HuskyPlay</title>
  <link rel="icon" type="image/png" href="icon.png"/>
  <link rel="apple-touch-icon" href="icon.png"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="stylesheet" href="style.css"/>
  <meta name="theme-color" content="#FFB703"/>
</head>
<body class="login-page">
  <div class="login-box">
    <div class="login-logo">
      <span class="husky">Husky</span>
      <span class="play-text">Play</span>
      <div class="play-icon">
        <svg viewBox="0 0 10 12"><polygon points="0,0 10,6 0,12"/></svg>
      </div>
    </div>
    <h2>Faça login para continuar</h2>
    <form id="loginForm">
      <div class="field">
        <label>Usuário</label>
        <input type="text" id="username" placeholder="seu_usuario" required autocomplete="username"/>
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" id="password" placeholder="sua_senha" required autocomplete="current-password"/>
      </div>
      <button type="submit" class="btn-login" id="loginBtn">Entrar</button>
      <p id="loginError" class="login-error hidden"></p>
    </form>
  </div>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
    if (localStorage.getItem('hp_server')) location.href = 'app.html';

    // Pre-fill saved credentials
    const _savedUser = localStorage.getItem('hp_user');
    const _savedPass = localStorage.getItem('hp_pass');
    if (_savedUser) document.getElementById('username').value = _savedUser;
    if (_savedPass) document.getElementById('password').value = _savedPass;

    const SERVERS = [
      'http://fonteblack.sbs',
      'http://zeroum.blog:80',
      'http://pbkdiamond.site:80',
      'http://blackcyber.site',
      'http://gowpm.sbs',
      'http://cdn.vr766.com:80',
      'http://pbklite.site:80',
      'http://zilgringo.site:80',
      'http://blackouro.fun',
      'http://blackrubi.shop'
    ];

    const SERVERS = [
      'http://fonteblack.sbs',
      'http://zeroum.blog:80',
      'http://pbkdiamond.site:80',
      'http://blackcyber.site',
      'http://gowpm.sbs',
      'http://cdn.vr766.com:80',
      'http://pbklite.site:80',
      'http://zilgringo.site:80',
      'http://blackouro.fun',
      'http://blackrubi.shop'
    ];

    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value;
      const btn  = document.getElementById('loginBtn');
      const err  = document.getElementById('loginError');

      btn.disabled = true;
      err.classList.add('hidden');

      for (let i = 0; i < SERVERS.length; i++) {
        const server = SERVERS[i];
        btn.textContent = `Conectando... (${i + 1}/${SERVERS.length})`;
        try {
          const res = await fetch(`${server}/player_api.php?username=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}`, { signal: AbortSignal.timeout(6000) });
          if (!res.ok) continue;
          const data = await res.json();
          if (data.user_info && data.user_info.auth == 1) {
            localStorage.setItem('hp_server', server);
            localStorage.setItem('hp_user', user);
            localStorage.setItem('hp_pass', pass);
            if (data.user_info.exp_date) localStorage.setItem('hp_expiry', data.user_info.exp_date);
            location.href = 'app.html';
            return;
          }
        } catch {}
      }

      err.textContent = 'Usuário ou senha inválidos. Verifique suas credenciais.';
      err.classList.remove('hidden');
      btn.textContent = 'Entrar';
      btn.disabled = false;
    });
  </script>
</body>
</html>
