<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HuskyPlay</title>
  <link rel="icon" type="image/x-icon" href="icon.png.ico"/>
  <link rel="apple-touch-icon" href="icon.png.ico"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="stylesheet" href="style.css"/>
  <meta name="theme-color" content="#FFB703"/>
</head>
<body class="login-page">
  <div class="login-box">
    <div class="login-logo">
      <span class="husky">Husky</span>
      <span class="play-text">Play</span>
      <div class="play-icon">
        <svg viewBox="0 0 10 12"><polygon points="0,0 10,6 0,12"/></svg>
      </div>
    </div>
    <h2>Faça login para continuar</h2>
    <form id="loginForm">
      <div class="field">
        <label>Usuário</label>
        <input type="text" id="username" placeholder="seu_usuario" required autocomplete="username"/>
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" id="password" placeholder="sua_senha" required autocomplete="current-password"/>
      </div>
      <button type="submit" class="btn-login" id="loginBtn">Entrar</button>
      <p id="loginError" class="login-error hidden"></p>
    </form>
  </div>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
    if (localStorage.getItem('hp_server')) location.href = 'app.html';

    const _savedUser = localStorage.getItem('hp_user');
    const _savedPass = localStorage.getItem('hp_pass');
    if (_savedUser) document.getElementById('username').value = _savedUser;
    if (_savedPass) document.getElementById('password').value = _savedPass;

    // Cloudflare Worker proxy URL — substitua pela sua URL após o deploy
    // Instruções: https://workers.cloudflare.com → Create Worker → cole cloudflare-worker.js → Deploy
    const PROXY_URL = 'https://super-hall-2081.alanadianabrito22.workers.dev';

    const SERVERS = [
      'https://fonteblack.sbs',
      'https://zeroum.blog:80',
      'https://pbkdiamond.site:80',
      'https://blackcyber.site',
      'https://gowpm.sbs',
      'https://cdn.vr766.com:80',
      'https://pbklite.site:80',
      'https://zilgringo.site:80',
      'https://blackouro.fun',
      'https://blackrubi.shop'
    ];

    // Se estiver em HTTPS, usa o proxy automaticamente
    const needsProxy = location.protocol === 'https:';

    function proxyFetch(url, opts = {}) {
      const fetchUrl = needsProxy ? `${PROXY_URL}?url=${encodeURIComponent(url)}` : url;
      return fetch(fetchUrl, opts);
    }

    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value;
      const btn  = document.getElementById('loginBtn');
      const err  = document.getElementById('loginError');

      btn.disabled = true;
      err.classList.add('hidden');

      for (let i = 0; i < SERVERS.length; i++) {
        const server = SERVERS[i];
        btn.textContent = `Conectando... (${i + 1}/${SERVERS.length})`;
        try {
          const apiUrl = `${server}/player_api.php?username=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}`;
          const res = await proxyFetch(apiUrl, { signal: AbortSignal.timeout(8000) });
          if (!res.ok) continue;
          const data = await res.json();
          if (data.user_info && data.user_info.auth == 1) {
            // Salva o server com proxy embutido se necessário
            localStorage.setItem('hp_server', server);
            localStorage.setItem('hp_user', user);
            localStorage.setItem('hp_pass', pass);
            localStorage.setItem('hp_proxy', needsProxy ? PROXY_URL : '');
            if (data.user_info.exp_date) localStorage.setItem('hp_expiry', data.user_info.exp_date);
            location.href = 'app.html';
            return;
          }
        } catch {}
      }

      err.textContent = 'Usuário ou senha inválidos. Verifique suas credenciais.';
      err.classList.remove('hidden');
      btn.textContent = 'Entrar';
      btn.disabled = false;
    });
  </script>
</body>
</html>
